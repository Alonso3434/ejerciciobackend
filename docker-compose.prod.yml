services:
  db-inventario:
    image: ${DOCKERHUB_USERNAME}/db-inventario-videojuegos:latest
    container_name: db-inventario-videojuegos
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_videojuegos_inventario
    ports:
      - "3307:3306"
    volumes:
      - inventario_data:/var/lib/mysql
    networks:
      - red-videojuegos
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -padmin123 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  db-ventas:
    image: ${DOCKERHUB_USERNAME}/db-ventas-videojuegos:latest
    container_name: db-ventas-videojuegos
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_videojuegos_ventas
    ports:
      - "3308:3306"
    volumes:
      - ventas_data:/var/lib/mysql
    networks:
      - red-videojuegos
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -padmin123 --silent || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  msv-ventas:
    image: ${DOCKERHUB_USERNAME}/msv-ventas-videojuegos:latest
    container_name: msv-ventas-videojuegos
    restart: always
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: db-ventas
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin123
      DB_NAME: tienda_videojuegos_ventas
    depends_on:
      db-ventas:
        condition: service_healthy
    networks:
      - red-videojuegos

  msv-despacho:
    image: ${DOCKERHUB_USERNAME}/msv-despacho-videojuegos:latest
    container_name: msv-despacho-videojuegos
    restart: always
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: db-ventas
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin123
      DB_NAME: tienda_videojuegos_ventas
    depends_on:
      db-ventas:
        condition: service_healthy
    networks:
      - red-videojuegos

volumes:
  inventario_data:
  ventas_data:

networks:
  red-videojuegos:
    driver: bridge