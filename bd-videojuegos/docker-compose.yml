services:
  db-inventario:
    build: ./db-inventario
    container_name: db-inventario-videojuegos
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_videojuegos_inventario
    ports:
      - "3307:3306"
    volumes:
      - inventario_data:/var/lib/mysql
    networks:
      - red-videojuegos

  db-ventas:
    build: ./db-ventas
    container_name: db-ventas-videojuegos
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_videojuegos_ventas
    ports:
      - "3308:3306"
    volumes:
      - ventas_data:/var/lib/mysql
    networks:
      - red-videojuegos

volumes:
  inventario_data:
  ventas_data:

networks:
  red-videojuegos:
    driver: bridge